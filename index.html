<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHRONOLAB ⏱ - SOHAIB CHEKRI</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --info: #3498db; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family:'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); min-height: 100vh; padding: 10px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        h2 { text-align:center; margin-bottom:15px; font-size: 1.6rem; color: #2c3e50; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #f0f0f0; padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; background: transparent; font-size: 1rem; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .input-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 16px; appearance: none; }
        input[type="text"]:focus { border-color: var(--primary); background: #f9f9ff; }
        
        .search-bar { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; font-size: 14px; background: #fafafa; }

        .btn-add-main { background: var(--success); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .task-item, .archive-item { 
            padding: 18px; border: 1px solid #eee; border-radius: 15px; margin-bottom: 12px;
            display: flex; flex-direction: column; gap: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .task-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .task-name { font-weight: bold; font-size: 1.1rem; color: #34495e; flex: 1; text-transform: uppercase; }
        .timer-display { font-family: 'Courier New', monospace; font-size: 1.8rem; font-weight: 800; color: var(--primary); text-align: center; }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .btn-start { background: var(--success); }
        .btn-stop { background: var(--danger); }
        .btn-reset { background: var(--warning); }
        .btn-archive { background: var(--secondary); }
        .btn-delete { background: #eaeff2; color: #7f8c8d; }

        .day-header { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        
        .total-box { margin-top: 20px; padding: 20px; background: #f4f7fe; border-radius: 15px; text-align: center; border: 2px dashed var(--primary); }
        .total-val { font-size: 2.5rem; font-weight: 900; color: var(--primary); }

        .footer { text-align: center; margin-top: 30px; font-size: 0.8rem; color: #7f8c8d; padding-bottom: 20px; }
        .signature { color: var(--primary); font-weight: bold; display: block; margin-top: 8px; }

        @media (min-width: 600px) {
            .input-section { flex-direction: row; }
            .task-item { flex-direction: row; align-items: center; }
            .btn-group { width: auto; }
            .btn { width: 50px; flex: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ChronoLab ⏱</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('chrono', event)">⏱ Chronos</button>
        <button class="tab-btn" onclick="openTab('archives', event)">🗃 Archives</button>
    </div>

    <div id="chrono" class="tab-content active">
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Nouvelle manipulation...">
            <button class="btn-add-main" onclick="addTask()">+ Ajouter</button>
        </div>
        <input type="text" id="searchChrono" class="search-bar" placeholder="🔍 Filtrer les chronos en cours..." oninput="render()">
        <div id="todayList"></div>
        <div class="total-box">
            <div style="font-weight: bold; margin-bottom: 5px;">TEMPS TOTAL</div>
            <div class="total-val" id="grandTotal">00:00</div>
        </div>
    </div>

    <div id="archives" class="tab-content">
        <input type="text" id="searchArch" class="search-bar" placeholder="🔍 Rechercher dans l'historique..." oninput="filterArchives()">
        <div id="archiveContainer"></div>
        <button class="btn" style="background: #2c3e50; width: 100%; margin-top: 15px; font-size: 0.9rem;" onclick="exportFullPDF()">📄 EXPORTER RAPPORT COMPLET (PDF)</button>
    </div>

    <div class="footer">
        © 2026 ChronoLab Microbiologie
        <span class="signature">CREATED BY SOHAIB CHEKRI</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let archives = JSON.parse(localStorage.getItem('archives') || '[]');
    let timers = {};

    function save() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
        localStorage.setItem('archives', JSON.stringify(archives));
    }

    function openTab(id, event) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
        if(id === 'archives') filterArchives(); 
        else render();
    }

    function addTask() {
        const val = document.getElementById('taskInput').value.trim();
        if(!val) return;
        tasks.push({ id: Date.now(), name: val, elapsed: 0, running: false });
        document.getElementById('taskInput').value = '';
        save(); render();
    }

    function toggleTimer(id) {
        const t = tasks.find(x => x.id === id);
        if(!t) return;
        if(t.running) {
            t.running = false;
            t.elapsed += Math.floor((Date.now() - t.startTime) / 1000);
            clearInterval(timers[id]);
        } else {
            t.running = true;
            t.startTime = Date.now();
            timers[id] = setInterval(() => {
                const current = t.elapsed + Math.floor((Date.now() - t.startTime) / 1000);
                const el = document.getElementById('time-' + id);
                if(el) el.innerText = formatTime(current);
                updateGrandTotal();
            }, 1000);
        }
        save(); render();
    }

    // MODIFICATION : LA TACHE RESTE AFFICHÉE (PAS DE FILTER)
    function archiveTask(id) {
        const t = tasks.find(x => x.id === id);
        if(!t) return;
        const finalSec = t.elapsed + (t.running ? Math.floor((Date.now() - t.startTime) / 1000) : 0);
        const now = new Date();
        archives.unshift({
            id: Date.now(),
            name: t.name,
            elapsed: finalSec,
            date: now.toLocaleDateString('fr-FR'),
            time: now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
        });
        
        // Signal visuel rapide sur le bouton pour confirmer l'action
        const btn = event.currentTarget;
        btn.style.background = "#27ae60";
        setTimeout(() => { btn.style.background = ""; }, 500);

        save();
        // On ne supprime plus la tâche de la liste ici
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if(h > 0) return `${h}h ${m}m`;
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function updateGrandTotal() {
        let total = 0;
        tasks.forEach(t => {
            total += t.elapsed + (t.running ? Math.floor((Date.now() - t.startTime) / 1000) : 0);
        });
        const el = document.getElementById('grandTotal');
        if(el) el.innerText = formatTime(total);
    }

    function render() {
        const query = document.getElementById('searchChrono').value.toLowerCase();
        const filtered = tasks.filter(t => t.name.toLowerCase().includes(query));
        
        document.getElementById('todayList').innerHTML = filtered.map(t => `
            <div class="task-item">
                <div class="task-header">
                    <div class="task-name">${t.name}</div>
                    <button class="btn-delete" style="border:none; background:none; font-size:1.2rem;" onclick="deleteTask(${t.id})">✕</button>
                </div>
                <div class="timer-display" id="time-${t.id}">${formatTime(t.elapsed)}</div>
                <div class="btn-group">
                    <button class="btn ${t.running?'btn-stop':'btn-start'}" onclick="toggleTimer(${t.id})">${t.running?'⏹':'▶'}</button>
                    <button class="btn btn-reset" onclick="resetTimer(${t.id})">↻</button>
                    <button class="btn btn-archive" onclick="archiveTask(${t.id})">📂</button>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#999;">Aucun chrono trouvé.</p>';
        updateGrandTotal();
    }

    // RECHERCHE AMÉLIORÉE (SENSITIVE)
    function filterArchives() {
        const searchInput = document.getElementById('searchArch');
        const query = searchInput.value.toLowerCase().trim();
        const container = document.getElementById('archiveContainer');
        
        const filtered = archives.filter(a => 
            a.name.toLowerCase().includes(query) || (a.date && a.date.includes(query))
        );
        
        const groups = filtered.reduce((acc, a) => {
            const day = a.date || "Inconnu";
            if(!acc[day]) acc[day] = [];
            acc[day].push(a);
            return acc;
        }, {});

        container.innerHTML = Object.keys(groups).map(day => `
            <div style="margin-bottom:20px;">
                <div class="day-header">
                    <span>🗓 ${day}</span>
                    <button onclick="exportDayPDF('${day}')" style="border:none; background:#ddd; padding:4px 8px; border-radius:5px; font-size:10px;">PDF</button>
                </div>
                ${groups[day].map(a => `
                    <div class="archive-item">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="task-name" style="font-size:1rem;">${a.name}</div>
                            <div style="font-weight:bold; color:var(--primary);">${formatTime(a.elapsed)}</div>
                        </div>
                        <button class="btn-delete" style="width:100%; padding:8px; border-radius:8px; border:1px solid #eee; font-size:0.8rem;" onclick="deleteArch(${a.id})">Supprimer l'archive</button>
                    </div>
                `).join('')}
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#999;">Aucun résultat.</p>';
    }

    function deleteTask(id) { if(confirm("Supprimer ce chrono ?")) { tasks = tasks.filter(x => x.id !== id); save(); render(); } }
    function deleteArch(id) { if(confirm("Supprimer définitivement cette archive ?")) { archives = archives.filter(x => x.id !== id); save(); filterArchives(); } }
    
    // RESET SANS CONFIRMATION
    function resetTimer(id) { 
        const t = tasks.find(x => x.id === id); 
        if(t) { 
            t.elapsed = 0; 
            if(t.running) { clearInterval(timers[id]); t.running = false; } 
            save(); render(); 
        } 
    }

    function exportDayPDF(day) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text(`CHRONOLAB - Rapport du ${day}`, 15, 20);
        let y = 35;
        archives.filter(a => a.date === day).forEach((a, i) => {
            doc.text(`${i+1}. ${a.name} : ${formatTime(a.elapsed)}`, 15, y);
            y += 10;
        });
        doc.save(`ChronoLab_${day}.pdf`);
    }

    function exportFullPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("CHRONOLAB - RAPPORT COMPLET", 15, 20);
        let y = 35;
        archives.forEach(a => {
            doc.text(`${a.date} | ${a.name} : ${formatTime(a.elapsed)}`, 15, y);
            y += 10;
            if(y > 280) { doc.addPage(); y = 20; }
        });
        doc.save("ChronoLab_Historique.pdf");
    }

    render();
</script>
</body>
</html>
