<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHRONOLAB ⏱ - SOHAIB CHEKRI</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --info: #3498db; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family:'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); min-height: 100vh; padding: 10px; color: #333; }
        
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        
        h2 { text-align:center; margin-bottom:15px; font-size: 1.5rem; }

        .tabs { display: flex; gap: 5px; margin-bottom: 20px; background: #f0f0f0; padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px 5px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; background: transparent; font-size: 0.9rem; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Adaptabilité Mobile du formulaire */
        .input-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 16px; }
        
        .search-wrapper { margin-bottom: 15px; }
        .search-bar { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 14px; background: #fdfdfd; }

        /* Cartes pour mobile */
        .task-item, .archive-item { 
            padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 10px; background: #fff;
        }
        
        .task-info-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .task-name { font-weight: 600; font-size: 1.1rem; color: #2c3e50; }
        .timer-display { font-family: monospace; font-size: 1.6rem; font-weight: bold; color: var(--primary); text-align: center; }

        /* Groupe de boutons adapté au pouce */
        .btn-group { display: flex; gap: 8px; width: 100%; }
        .btn { flex: 1; padding: 12px 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        
        .btn-start { background: var(--success); }
        .btn-stop { background: var(--danger); }
        .btn-reset { background: var(--warning); }
        .btn-archive { background: var(--secondary); }
        .btn-delete { background: #bdc3c7; }
        
        .btn-add-main { background: var(--success); width: 100%; padding: 15px; font-size: 1rem; }

        .day-group { margin-bottom: 20px; border: 1px solid #eee; border-radius: 15px; overflow: hidden; background: #fff; }
        .day-header { background: #f8f9fa; padding: 12px 15px; border-bottom: 2px solid var(--primary); font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        .total-box { margin-top: 20px; padding: 15px; background: #f4f7fe; border-radius: 15px; text-align: center; border: 2px dashed var(--primary); }
        .total-val { font-size: 2.2em; font-weight: bold; color: var(--primary); }

        .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #777; padding-bottom: 20px; }
        .signature { color: var(--primary); font-weight: bold; display: block; margin-top: 5px; font-size: 14px; }

        /* Desktop Adjustments */
        @media (min-width: 600px) {
            .input-section { flex-direction: row; }
            .task-item { flex-direction: row; }
            .btn-group { width: auto; }
            .btn { flex: none; width: 45px; }
            .btn-add-main { width: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ChronoLab ⏱</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('chrono', event)">⏱ Chronos</button>
        <button class="tab-btn" onclick="openTab('archives', event)">🗃 Archives</button>
    </div>

    <div id="chrono" class="tab-content active">
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Nouvelle manipulation...">
            <button class="btn btn-add-main" onclick="addTask()">+ Ajouter</button>
        </div>
        <div class="search-wrapper">
            <input type="text" id="searchChrono" class="search-bar" placeholder="🔍 Filtrer les chronos..." onkeyup="render()">
        </div>
        <div id="todayList"></div>
        <div class="total-box">
            <div style="font-weight: bold; color: #666; font-size: 0.9rem;">TOTAL AUJOURD'HUI</div>
            <div class="total-val" id="grandTotal">00:00</div>
        </div>
    </div>

    <div id="archives" class="tab-content">
        <div class="search-wrapper">
            <input type="text" id="searchArch" class="search-bar" placeholder="🔍 Rechercher (nom ou date)..." onkeyup="render()">
        </div>
        <div id="archiveContainer"></div>
        <button class="btn btn-export-all" style="background: #2c3e50; width: 100%; padding: 15px; margin-top: 10px;" onclick="exportFullPDF()">📄 EXPORTER TOUT L'HISTORIQUE (PDF)</button>
    </div>

    <div class="footer">
        © 2026 ChronoLab Microbiologie
        <span class="signature">CREATED BY SOHAIB CHEKRI</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let archives = JSON.parse(localStorage.getItem('archives') || '[]');
    let timers = {};

    function save() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
        localStorage.setItem('archives', JSON.stringify(archives));
    }

    function openTab(id, event) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
        render();
    }

    function addTask() {
        const val = document.getElementById('taskInput').value.trim();
        if(!val) return;
        tasks.push({ id: Date.now(), name: val.toUpperCase(), elapsed: 0, running: false });
        document.getElementById('taskInput').value = '';
        save(); render();
    }

    function toggleTimer(id) {
        const t = tasks.find(x => x.id === id);
        if(!t) return;
        if(t.running) {
            t.running = false;
            t.elapsed += Math.floor((Date.now() - t.startTime) / 1000);
            clearInterval(timers[id]);
        } else {
            t.running = true;
            t.startTime = Date.now();
            timers[id] = setInterval(() => {
                const current = t.elapsed + Math.floor((Date.now() - t.startTime) / 1000);
                const el = document.getElementById('time-' + id);
                if(el) el.innerText = formatTime(current);
                updateGrandTotal();
            }, 1000);
        }
        save(); render();
    }

    function resetTimer(id) {
        if(!confirm("Réinitialiser ce chrono ?")) return;
        const t = tasks.find(x => x.id === id);
        if(t && t.running) { clearInterval(timers[id]); t.running = false; }
        if(t) t.elapsed = 0;
        save(); render();
    }

    function archiveTask(id) {
        const t = tasks.find(x => x.id === id);
        if(!t) return;
        const finalSec = t.elapsed + (t.running ? Math.floor((Date.now() - t.startTime) / 1000) : 0);
        const now = new Date();
        archives.unshift({
            id: Date.now() + Math.random(),
            name: t.name,
            elapsed: finalSec,
            date: now.toLocaleDateString('fr-FR'),
            time: now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
        });
        save(); render();
        alert("Envoyé aux archives !");
    }

    function formatTime(s) {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if(h > 0) return `${h}h ${m}m`;
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    function updateGrandTotal() {
        let total = 0;
        tasks.forEach(t => {
            total += t.elapsed + (t.running ? Math.floor((Date.now() - t.startTime) / 1000) : 0);
        });
        const el = document.getElementById('grandTotal');
        if(el) el.innerText = formatTime(total);
    }

    function render() {
        const searchChrono = document.getElementById('searchChrono').value.toLowerCase();
        const filteredTasks = tasks.filter(t => t.name.toLowerCase().includes(searchChrono));
        
        document.getElementById('todayList').innerHTML = filteredTasks.map(t => `
            <div class="task-item">
                <div class="task-info-row">
                    <div class="task-name">${t.name}</div>
                    <button class="btn btn-delete" style="flex:none; width:35px; height:35px; padding:0;" onclick="deleteTask(${t.id})">✕</button>
                </div>
                <div class="timer-display" id="time-${t.id}">${formatTime(t.elapsed)}</div>
                <div class="btn-group">
                    <button class="btn ${t.running?'btn-stop':'btn-start'}" onclick="toggleTimer(${t.id})">${t.running?'⏹':'▶'}</button>
                    <button class="btn btn-reset" onclick="resetTimer(${t.id})">↻</button>
                    <button class="btn btn-archive" onclick="archiveTask(${t.id})">📂</button>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; padding:10px; color:#999;">Aucun chrono en cours.</p>';

        const searchArch = document.getElementById('searchArch').value.toLowerCase();
        const filteredArch = archives.filter(a => 
            (a.name && a.name.toLowerCase().includes(searchArch)) || 
            (a.date && a.date.includes(searchArch))
        );

        const groups = filteredArch.reduce((acc, a) => {
            const day = a.date || "Inconnu";
            if(!acc[day]) acc[day] = [];
            acc[day].push(a);
            return acc;
        }, {});

        document.getElementById('archiveContainer').innerHTML = Object.keys(groups).map(day => `
            <div class="day-group">
                <div class="day-header">
                    <span>🗓 ${day}</span>
                    <button class="btn btn-info" style="font-size:10px; padding:5px 10px;" onclick="exportDayPDF('${day}')">PDF</button>
                </div>
                ${groups[day].map(a => `
                    <div class="archive-item">
                        <div class="task-info-row">
                            <div class="task-name">${a.name} <br><small style="color:#888; font-weight:normal;">à ${a.time || ''}</small></div>
                            <div class="timer-display" style="font-size:1.2rem;">${formatTime(a.elapsed)}</div>
                        </div>
                        <button class="btn btn-delete" style="width:100%; padding:8px; font-size:0.9rem;" onclick="deleteArch(${a.id})">Supprimer l'archive</button>
                    </div>
                `).join('')}
            </div>
        `).join('') || '<p style="text-align:center; padding:20px; color:#999;">Aucune archive.</p>';
        
        updateGrandTotal();
    }

    function deleteTask(id) {
        if(confirm("Supprimer ce chrono ?")) {
            tasks = tasks.filter(x => x.id !== id);
            save(); render();
        }
    }

    function deleteArch(id) {
        if(confirm("Supprimer définitivement ?")) {
            archives = archives.filter(x => x.id !== id);
            save(); render();
        }
    }

    function exportDayPDF(day) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = archives.filter(a => a.date === day);
        doc.text(`RAPPORT CHRONOLAB - ${day}`, 10, 20);
        let y = 40;
        data.forEach((a, i) => {
            doc.text(`${i+1}. [${a.time}] ${a.name} : ${formatTime(a.elapsed)}`, 15, y);
            y += 10;
        });
        doc.save(`ChronoLab_${day}.pdf`);
    }

    function exportFullPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("RAPPORT CHRONOLAB COMPLET", 10, 20);
        let y = 40;
        archives.forEach((a) => {
            doc.text(`[${a.date} ${a.time}] ${a.name} : ${formatTime(a.elapsed)}`, 15, y);
            y += 10;
            if(y > 280) { doc.addPage(); y = 20; }
        });
        doc.save("ChronoLab_Historique.pdf");
    }

    render();
</script>
</body>
</html>
