<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHRONOLAB ⏱</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family:'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary), var(--secondary)); min-height: 100vh; padding: 10px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; background: #f0f0f0; padding: 5px; border-radius: 15px; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: transparent; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Search Bar */
        .search-box { 
            width: 100%; padding: 15px; border: 2px solid #667eea; border-radius: 12px; 
            margin-bottom: 15px; font-size: 16px; outline: none;
        }

        .archive-item { 
            padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px;
            background: #fdfdfd; display: flex; justify-content: space-between; align-items: center;
        }
        
        .day-header { 
            background: #eef2ff; padding: 10px; border-radius: 8px; font-weight: bold; 
            margin: 15px 0 10px 0; color: var(--primary); display: flex; justify-content: space-between;
        }

        .btn-del { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-bottom:15px;">ChronoLab ⏱</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('chrono', event)">⏱ Chronos</button>
        <button class="tab-btn" onclick="openTab('archives', event)">🗃 Archives</button>
    </div>

    <div id="chrono" class="tab-content active">
        <p style="text-align:center; color:#999;">Gérez vos chronos ici.</p>
    </div>

    <div id="archives" class="tab-content">
        <input type="text" id="searchArch" class="search-box" placeholder="🔍 Taper un nom ou une date..." oninput="filterArchives()">
        
        <div id="archiveList"></div>
    </div>
</div>

<script>
    // Simulation de données basées sur tes captures
    let archives = JSON.parse(localStorage.getItem('archives') || '[]');

    function openTab(id, event) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'archives') filterArchives();
    }

    function filterArchives() {
        const query = document.getElementById('searchArch').value.toLowerCase().trim();
        const listContainer = document.getElementById('archiveList');
        
        // On vide l'affichage actuel
        listContainer.innerHTML = '';

        // Filtrage des données
        const filtered = archives.filter(a => {
            const nameMatch = a.name.toLowerCase().includes(query);
            const dateMatch = a.date.includes(query);
            return nameMatch || dateMatch;
        });

        if (filtered.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; padding:20px; color:#999;">Aucun résultat trouvé.</p>';
            return;
        }

        // Groupement par date pour l'affichage
        const groups = filtered.reduce((acc, obj) => {
            const key = obj.date;
            if (!acc[key]) acc[key] = [];
            acc[key].push(obj);
            return acc;
        }, {});

        // Génération du HTML
        Object.keys(groups).forEach(date => {
            let daySection = document.createElement('div');
            daySection.innerHTML = `
                <div class="day-header">
                    <span>📅 ${date}</span>
                </div>
            `;
            
            groups[date].forEach(item => {
                let itemDiv = document.createElement('div');
                itemDiv.className = 'archive-item';
                itemDiv.innerHTML = `
                    <div>
                        <div style="font-weight:bold;">${item.name}</div>
                        <div style="font-size:0.8rem; color:#888;">${item.time || ''}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="color:var(--primary); font-weight:bold;">${item.duration}</div>
                        <button class="btn-del" onclick="deleteArch(${item.id})">Supprimer</button>
                    </div>
                `;
                daySection.appendChild(itemDiv);
            });
            listContainer.appendChild(daySection);
        });
    }

    function deleteArch(id) {
        if(confirm("Supprimer définitivement cette archive ?")) {
            archives = archives.filter(a => a.id !== id);
            localStorage.setItem('archives', JSON.stringify(archives));
            filterArchives();
        }
    }

    // Initialisation
    filterArchives();
</script>
</body>
</html>
