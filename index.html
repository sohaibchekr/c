<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHRONOLAB ⏱</title>
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family:'Segoe UI', sans-serif; background: #f4f7fe; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 20px; padding: 15px; }
        
        /* Barre de recherche optimisée */
        .search-container { position: sticky; top: 0; background: white; padding: 10px 0; z-index: 100; }
        .search-box { 
            width: 100%; padding: 15px; border: 2px solid var(--primary); 
            border-radius: 12px; font-size: 16px; outline: none;
        }

        .day-group { margin-bottom: 20px; }
        .day-header { 
            background: #eef2ff; padding: 10px; border-radius: 8px; 
            font-weight: bold; color: var(--primary); margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .archive-item { 
            padding: 15px; border: 1px solid #eee; border-radius: 12px; 
            margin-bottom: 8px; display: flex; justify-content: space-between;
        }
        
        /* Classe pour cacher les éléments */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="search-container">
        <input type="text" id="searchArch" class="search-box" placeholder="🔍 Taper 04/ ou un nom..." oninput="superFilter()">
    </div>
    
    <div id="archiveContainer">
        </div>
</div>

<script>
    // Récupération des données réelles
    let archives = JSON.parse(localStorage.getItem('archives') || '[]');

    function renderInitial() {
        const container = document.getElementById('archiveContainer');
        const groups = archives.reduce((acc, a) => {
            if (!acc[a.date]) acc[a.date] = [];
            acc[a.date].push(a);
            return acc;
        }, {});

        container.innerHTML = Object.keys(groups).map(date => `
            <div class="day-group" data-date="${date}">
                <div class="day-header">🗓 ${date}</div>
                ${groups[date].map(a => `
                    <div class="archive-item" data-name="${a.name.toLowerCase()}">
                        <span>${a.name}</span>
                        <span style="font-weight:bold; color:#667eea;">${formatTime(a.elapsed)}</span>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }

    function superFilter() {
        const val = document.getElementById('searchArch').value.toLowerCase().trim();
        const groups = document.querySelectorAll('.day-group');

        groups.forEach(group => {
            const date = group.getAttribute('data-date').toLowerCase();
            const items = group.querySelectorAll('.archive-item');
            let hasVisibleItem = false;

            // Si la date correspond (ex: "04/"), on montre tout le groupe
            if (date.includes(val)) {
                group.classList.remove('hidden');
                items.forEach(item => item.classList.remove('hidden'));
                hasVisibleItem = true;
            } else {
                // Sinon, on vérifie chaque tâche à l'intérieur
                items.forEach(item => {
                    const name = item.getAttribute('data-name');
                    if (name.includes(val)) {
                        item.classList.remove('hidden');
                        hasVisibleItem = true;
                    } else {
                        item.classList.add('hidden');
                    }
                });

                // Si aucune tâche ne correspond dans ce jour, on cache le titre du jour
                if (hasVisibleItem) {
                    group.classList.remove('hidden');
                } else {
                    group.classList.add('hidden');
                }
            }
        });
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = s % 60;
        return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
    }

    // Lancement
    renderInitial();
</script>
</body>
</html>
